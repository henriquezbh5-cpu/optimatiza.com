<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280">
  <title>R-07</title>
  <style>
    @keyframes mini-pulse{0%,100%{opacity:.35}50%{opacity:1}}
    @keyframes mini-wave{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
    @keyframes mini-blink{0%,60%,100%{opacity:.15}15%,35%{opacity:1}}
    @keyframes mini-radiate{0%,100%{opacity:.15}30%,55%{opacity:1}}
    .ill-live{animation:mini-pulse 2.4s ease-in-out infinite}
    .mini-arm{transform-box:fill-box;transform-origin:0% 100%;animation:mini-wave 1.8s ease-in-out infinite}
    .mini-warc{animation:mini-blink 1.8s ease-in-out infinite}
    .mini-w2{animation-delay:.25s}
    .mini-sig{animation:mini-radiate 2.8s ease-in-out infinite}
    .mini-s2{animation-delay:.4s}
    @media (prefers-reduced-motion: reduce){*{animation:none !important}}
  </style>
  <defs>
    <pattern id="fH" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(15,43,70,.45)" stroke-width="1"/>
    </pattern>
    <pattern id="fHd" patternUnits="userSpaceOnUse" width="3.5" height="3.5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3.5" stroke="rgba(15,43,70,.45)" stroke-width="1"/>
    </pattern>
    <g id="fBot" stroke="#0F2B46" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-34" y="-24" width="68" height="24" rx="12" fill="url(#fHd)" stroke-width="1.75"/>
      <circle cx="-18" cy="-12" r="6.5" fill="#F6F4EE" stroke-width="1"/>
      <circle cx="0" cy="-12" r="6.5" fill="#F6F4EE" stroke-width="1"/>
      <circle cx="18" cy="-12" r="6.5" fill="#F6F4EE" stroke-width="1"/>
      <rect x="-12" y="-34" width="24" height="10" fill="#FFFFFF" stroke-width="1.75"/>
      <rect x="-36" y="-104" width="72" height="70" rx="12" fill="#FFFFFF" stroke-width="2.5" class="ill-draw"/>
      <rect x="16" y="-100" width="17" height="62" fill="url(#fH)" stroke="none"/>
      <path d="M14 -102 V-36" stroke="rgba(15,43,70,.45)" stroke-width="1"/>
      <path d="M-36 -58 H14" stroke="rgba(15,43,70,.45)" stroke-width="1"/>
      <circle cx="-30" cy="-98" r="1.6" stroke-width="1"/>
      <circle cx="-30" cy="-42" r="1.6" stroke-width="1"/>
      <circle cx="8" cy="-98" r="1.6" stroke-width="1"/>
      <circle cx="8" cy="-42" r="1.6" stroke-width="1"/>
      <circle cx="24" cy="-70" r="1.6" stroke-width="1"/>
      <rect x="-28" y="-66" width="34" height="15" rx="2" fill="#F6F4EE" stroke-width="1"/>
      <rect x="-9" y="-114" width="18" height="10" fill="#FFFFFF" stroke-width="1.75"/>
      <rect x="-29" y="-150" width="58" height="38" rx="9" fill="#FFFFFF" stroke-width="2.5" class="ill-draw"/>
      <rect x="-21" y="-143" width="42" height="25" rx="4" fill="#F6F4EE" stroke-width="1.75"/>
      <g fill="#0F2B46" stroke="none">
        <circle cx="-13" cy="-134" r="1.7"/><circle cx="-8" cy="-134" r="1.7"/>
        <circle cx="-13" cy="-129" r="1.7"/><circle cx="-8" cy="-129" r="1.7"/>
        <circle cx="8" cy="-134" r="1.7"/><circle cx="13" cy="-134" r="1.7"/>
        <circle cx="8" cy="-129" r="1.7"/><circle cx="13" cy="-129" r="1.7"/>
        <circle cx="-4" cy="-123" r="1"/><circle cx="0" cy="-123" r="1"/><circle cx="4" cy="-123" r="1"/>
      </g>
      <circle cx="-29" cy="-131" r="3" fill="#F6F4EE" stroke-width="1"/>
      <circle cx="29" cy="-131" r="3" fill="#F6F4EE" stroke-width="1"/>
      <path d="M0 -150 V-166" stroke-width="1.75"/>
      <circle cx="0" cy="-170" r="6" stroke="#0F766E" stroke-width="1" class="ill-live"/>
      <circle cx="0" cy="-170" r="3.5" fill="#14B8A6" stroke="none" class="ill-live"/>
      <circle cx="-36" cy="-88" r="5.5" fill="#FFFFFF" stroke-width="1.75"/>
      <circle cx="36" cy="-88" r="5.5" fill="#FFFFFF" stroke-width="1.75"/>
    </g>
  </defs>

  <g stroke="#0F2B46" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- corner ticks -->
    <path d="M12 24 V12 H24 M216 12 H228 V24 M228 256 V268 H216 M24 268 H12 V256" stroke="rgba(15,43,70,.45)" stroke-width="1"/>

    <!-- ground + shadow -->
    <path d="M52 252 H188" stroke-width="1.75"/>
    <ellipse cx="120" cy="254" rx="46" ry="6" fill="url(#fH)" stroke="none"/>

    <!-- ROBOT R-07 : waving -->
    <use href="#fBot" transform="translate(120,252)"/>
    <text x="109" y="197" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#0F2B46" stroke="none">R-07</text>
    <!-- broadcast arcs from antenna -->
    <path d="M110 72 a13 13 0 0 1 20 0" stroke="#0F766E" stroke-width="1" class="mini-sig"/>
    <path d="M104 66 a20 20 0 0 1 32 0" stroke="#0F766E" stroke-width="1" class="mini-sig mini-s2"/>
    <!-- waving right arm -->
    <g class="mini-arm">
      <path d="M156 164 L188 132 L196 106" stroke-width="2.5"/>
      <circle cx="188" cy="132" r="4" fill="#FFFFFF" stroke-width="1.75"/>
      <path d="M190 100 L186 90 M202 100 L206 90" stroke-width="2.5"/>
    </g>
    <path class="mini-warc" d="M212 104 a16 16 0 0 0 6 -22" stroke="rgba(15,43,70,.45)" stroke-width="1"/>
    <path class="mini-warc mini-w2" d="M222 110 a24 24 0 0 0 9 -33" stroke="rgba(15,43,70,.45)" stroke-width="1"/>
    <!-- left arm relaxed -->
    <path d="M84 164 L70 194 L78 216" stroke-width="2.5"/>
    <circle cx="70" cy="194" r="4" fill="#FFFFFF" stroke-width="1.75"/>
    <path d="M72 220 l-4 6 M84 218 l4 5" stroke-width="1.75"/>
  </g>
</svg>
