<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" role="img" aria-label="Punched paper tape feeds an analytical gear unit; a verified output chit exits through a guarded slot">
<title>FIG. 3D — APPLIED AI</title>
<style>
.vigai-g1,.vigai-g2,.vigai-g3{transform-box:fill-box;transform-origin:50% 50%}
.vigai-g1{animation:vigai-cw 11s linear infinite}
.vigai-g2{animation:vigai-ccw 14s linear infinite}
.vigai-g3{animation:vigai-cw 10s linear infinite}
@keyframes vigai-cw{to{transform:rotate(360deg)}}
@keyframes vigai-ccw{to{transform:rotate(-360deg)}}
.vigai-chit{animation:vigai-pulse 3s ease-in-out infinite}
@keyframes vigai-pulse{0%,100%{opacity:1}50%{opacity:.75}}
.vigai-tape{animation:vigai-drift 2.8s linear infinite}
@keyframes vigai-drift{0%{transform:translate(-3px,-2px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translate(3px,2px);opacity:0}}
@media (prefers-reduced-motion: reduce){*{animation:none !important}}
</style>
<!-- punched tape feeding in -->
<path class="ill-draw" d="M8,34 C40,34 60,44 78,60 C88,68 94,72 104,74" fill="none" stroke="#0F2B46" stroke-width="1.75"/>
<path class="ill-draw" d="M8,52 C40,52 58,60 74,74 C84,82 92,86 104,88" fill="none" stroke="#0F2B46" stroke-width="1.75"/>
<line x1="8" y1="34" x2="8" y2="52" stroke="#0F2B46" stroke-width="1.75"/>
<!-- feed holes + data punches -->
<g class="vigai-tape" fill="none" stroke="#0F2B46" stroke-width="1">
  <circle cx="20" cy="43" r="1.8"/><circle cx="34" cy="44" r="1.8"/><circle cx="48" cy="48" r="1.8"/><circle cx="62" cy="55" r="1.8"/><circle cx="76" cy="65" r="1.8"/><circle cx="90" cy="75" r="1.8"/>
  <circle cx="26" cy="38.5" r="1.2"/><circle cx="42" cy="40.5" r="1.2"/><circle cx="30" cy="48" r="1.2"/><circle cx="52" cy="54" r="1.2"/><circle cx="58" cy="49" r="1.2"/><circle cx="68" cy="62" r="1.2"/><circle cx="82" cy="72" r="1.2"/><circle cx="86" cy="66.5" r="1.2"/>
</g>
<!-- housing (cutaway) -->
<rect class="ill-draw" x="104" y="32" width="124" height="96" fill="none" stroke="#0F2B46" stroke-width="2.5"/>
<rect x="109" y="37" width="114" height="86" fill="none" stroke="#2D6A9F" stroke-width="1"/>
<text x="166" y="47" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="7" letter-spacing="2" fill="rgba(15,43,70,.45)">UNIT 04</text>
<!-- intake port, sectioned -->
<rect x="100" y="58" width="9" height="34" fill="#FFFFFF" stroke="#0F2B46" stroke-width="1.75"/>
<path d="M100,68 l8,-8 M100,78 l8,-8 M100,88 l8,-8" stroke="#2D6A9F" stroke-width="1" fill="none"/>
<!-- gear train: pitch circle solid + dashed addendum + hub -->
<g fill="none" stroke="#0F2B46">
  <circle class="ill-draw" cx="140" cy="66" r="14" stroke-width="1.75"/>
  <circle class="vigai-g1" cx="140" cy="66" r="17.5" stroke-width="1" stroke-dasharray="3.5 2.6"/>
  <circle cx="140" cy="66" r="3" stroke-width="1"/>
  <circle class="ill-draw" cx="171" cy="89" r="18" stroke-width="1.75"/>
  <circle class="vigai-g2" cx="171" cy="89" r="21.5" stroke-width="1" stroke-dasharray="3.5 2.6"/>
  <circle cx="171" cy="89" r="3.5" stroke-width="1"/>
  <circle class="ill-draw" cx="196" cy="62" r="11" stroke-width="1.75"/>
  <circle class="vigai-g3" cx="196" cy="62" r="14" stroke-width="1" stroke-dasharray="3.5 2.6"/>
  <circle cx="196" cy="62" r="2.5" stroke-width="1"/>
</g>
<path class="vigai-g1" d="M135,66 h10 M140,61 v10" stroke="#2D6A9F" stroke-width="1" fill="none"/>
<path class="vigai-g2" d="M166,89 h10 M171,84 v10" stroke="#2D6A9F" stroke-width="1" fill="none"/>
<path class="vigai-g3" d="M192,62 h8 M196,58 v8" stroke="#2D6A9F" stroke-width="1" fill="none"/>
<!-- guarded output slot with grille -->
<rect x="223" y="62" width="11" height="36" fill="#FFFFFF" stroke="#0F2B46" stroke-width="1.75"/>
<path d="M226,65 v30 M228.5,65 v30 M231,65 v30" stroke="#2D6A9F" stroke-width="1" fill="none"/>
<!-- exit motion marks -->
<path d="M236,72 h5 M236,86 h5" stroke="#2D6A9F" stroke-width="1" fill="none"/>
<!-- verified output chit (teal) -->
<g class="vigai-chit" transform="rotate(6 253 79)">
  <rect class="ill-draw" x="240" y="70" width="26" height="18" fill="#FFFFFF" stroke="#0F766E" stroke-width="1.75"/>
  <path d="M246,79 l4,4 l8,-8" fill="none" stroke="#0F766E" stroke-width="1.75"/>
</g>
<!-- dimension line -->
<g stroke="#2D6A9F" stroke-width="1" fill="none">
  <line x1="8" y1="58" x2="8" y2="148"/>
  <line x1="266" y1="96" x2="266" y2="148"/>
  <line x1="8" y1="144" x2="266" y2="144"/>
</g>
<path d="M8,144 l8,-2.5 v5 Z M266,144 l-8,-2.5 v5 Z" fill="#2D6A9F"/>
<rect x="64" y="136.5" width="146" height="15" fill="#FFFFFF"/>
<text x="137" y="147" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="1.5" fill="#0F2B46">GROUNDED IN YOUR DOCS</text>
<!-- reference balloons -->
<circle cx="24" cy="18" r="7" fill="#FFFFFF" stroke="#0F2B46" stroke-width="1"/>
<text x="24" y="21" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="#0F2B46">1</text>
<line x1="27" y1="24.5" x2="32" y2="33" stroke="#2D6A9F" stroke-width="1"/>
<circle cx="288" cy="44" r="7" fill="#FFFFFF" stroke="#0F2B46" stroke-width="1"/>
<text x="288" y="47" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="#0F2B46">2</text>
<line x1="283" y1="49" x2="262" y2="66" stroke="#2D6A9F" stroke-width="1"/>
</svg>
