<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 820" font-family="IBM Plex Mono, monospace" role="img" aria-labelledby="hbT hbD">
  <title id="hbT">FIG. 1 — The Process Machine</title>
  <desc id="hbD">Isometric cutaway engineering drawing: unstructured inputs enter an engineered machine (trigger, validate, integrate, notify) and exit as ordered output; rejected items route through an exception chute to a bin.</desc>
  <style>#hb-fig1 path,#hb-fig1 line,#hb-fig1 rect,#hb-fig1 circle,#hb-fig1 polygon{vector-effect:non-scaling-stroke}</style>
  <g id="hb-fig1">

