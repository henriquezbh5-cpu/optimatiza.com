<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" role="img" aria-label="Two systems joined by a bolted pipe union; data flows through, entered once">
<title>FIG. 3B — INTEGRATIONS &amp; APIs</title>
<style>
.vigint-flow{stroke-dasharray:10 14;animation:vigint-dash 1.8s linear infinite}
@keyframes vigint-dash{to{stroke-dashoffset:-24}}
.vigint-pulse{animation:vigint-pulse 2.4s ease-in-out infinite}
@keyframes vigint-pulse{0%,100%{opacity:1}50%{opacity:.6}}
@media (prefers-reduced-motion: reduce){*{animation:none !important}}
</style>
<!-- ducts -->
<rect class="ill-draw" x="10" y="62" width="136" height="36" fill="none" stroke="#0F2B46" stroke-width="2.5"/>
<rect class="ill-draw" x="174" y="62" width="136" height="36" fill="none" stroke="#0F2B46" stroke-width="2.5"/>
<!-- flanges (sectioned, hatched) -->
<rect class="ill-draw" x="146" y="50" width="10" height="60" fill="#FFFFFF" stroke="#0F2B46" stroke-width="1.75"/>
<rect class="ill-draw" x="164" y="50" width="10" height="60" fill="#FFFFFF" stroke="#0F2B46" stroke-width="1.75"/>
<g stroke="#2D6A9F" stroke-width="1" fill="none">
  <path d="M146,56 l6,-6 M146,64 l10,-10 M146,72 l10,-10 M146,80 l10,-10 M146,88 l10,-10 M146,96 l10,-10 M146,104 l10,-10 M150,110 l6,-6"/>
  <path d="M164,56 l6,-6 M164,64 l10,-10 M164,72 l10,-10 M164,80 l10,-10 M164,88 l10,-10 M164,96 l10,-10 M164,104 l10,-10 M168,110 l6,-6"/>
</g>
<!-- gasket -->
<line x1="160" y1="50" x2="160" y2="110" stroke="#2D6A9F" stroke-width="1" stroke-dasharray="4 3"/>
<!-- bolts: head + nut + dash-dot centerline -->
<g class="vigint-pulse" fill="none" stroke="#0F2B46" stroke-width="1.75">
  <rect x="138" y="51.5" width="8" height="9"/>
  <rect x="174" y="51.5" width="8" height="9"/>
  <rect x="138" y="99.5" width="8" height="9"/>
  <rect x="174" y="99.5" width="8" height="9"/>
</g>
<path d="M146,56 H174 M146,104 H174" stroke="#2D6A9F" stroke-width="1" stroke-dasharray="6 2 1.5 2" fill="none"/>
<!-- system labels -->
<text x="70" y="56" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="2" fill="#0F2B46">SYS A</text>
<text x="250" y="56" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="2" fill="#0F2B46">SYS B</text>
<!-- data flow (live element, teal) -->
<line class="ill-draw vigint-flow" x1="18" y1="80" x2="298" y2="80" stroke="#0F766E" stroke-width="1.75"/>
<path d="M302,80 l-9,-3 v6 Z" fill="#0F766E"/>
<!-- dimension line -->
<g stroke="#2D6A9F" stroke-width="1" fill="none">
  <line x1="10" y1="102" x2="10" y2="142"/>
  <line x1="310" y1="114" x2="310" y2="142"/>
  <line x1="10" y1="138" x2="310" y2="138"/>
</g>
<path d="M10,138 l8,-2.5 v5 Z M310,138 l-8,-2.5 v5 Z" fill="#2D6A9F"/>
<rect x="112" y="130.5" width="96" height="15" fill="#FFFFFF"/>
<text x="160" y="141" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="1.5" fill="#0F2B46">ENTERED ONCE</text>
<!-- reference balloon: the union -->
<circle class="vigint-pulse" cx="160" cy="20" r="7" fill="#FFFFFF" stroke="#0F2B46" stroke-width="1"/>
<text x="160" y="23" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="#0F2B46">1</text>
<line x1="160" y1="27.5" x2="160" y2="48" stroke="#2D6A9F" stroke-width="1"/>
</svg>
