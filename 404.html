        :root{

        *{margin:0;padding:0;box-sizing:border-box}
        html{-webkit-text-size-adjust:100%}
        body{
            font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--paper); color:var(--ink);
            display:flex; flex-direction:column; min-height:100vh; padding:24px;
            -webkit-font-smoothing:antialiased;
        }
        /* Header / seal */
        header.doc-head{
            display:flex; align-items:center; gap:14px; width:100%;
            max-width:900px; margin:0 auto; padding-bottom:16px; border-bottom:1.5px solid var(--ink);
        }
        .logo-seal{display:inline-flex; width:40px; height:40px; color:var(--ink); flex:0 0 auto}
        .seal-svg{width:100%; height:100%; display:block}
        .logo-badge{width:100%; height:100%; display:block; border-radius:50%}
        .seal-dot{animation:sealPulse 2.4s ease-in-out infinite}
        @keyframes sealPulse{0%,100%{opacity:.45}50%{opacity:1}}
        .brand-lines{display:flex; flex-direction:column; gap:3px}
        .logo-word{
            font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:16px;
            letter-spacing:.14em; color:var(--ink); text-decoration:none;
        }
        .brand-registry{
            font-family:'IBM Plex Mono',monospace; font-weight:400; font-size:9.5px;
            letter-spacing:.16em; color:var(--steel);
        }
        .doc-tag{
            margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:10px;
            letter-spacing:.14em; color:var(--steel); text-align:right;
        }
        @media (max-width:520px){.doc-tag{display:none}}

        main{
            flex:1; display:flex; align-items:center; justify-content:center; text-align:center;
            padding:40px 0;
        }
        .container{max-width:520px}
        .crew-fig{
            display:block; width:200px; max-width:56%; height:auto;
            margin:0 auto 26px; background:var(--paper-0);
            padding:16px 20px; border:1px solid var(--line);
        }
        .code{
            font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:11px;
            letter-spacing:.22em; text-transform:uppercase; color:var(--teal-ink); margin-bottom:14px;
        }
        h1{
            font-family:'Space Grotesk','Inter',sans-serif; font-weight:700; letter-spacing:-0.02em;
            font-size:clamp(2rem,6vw,2.9rem); line-height:1.08; letter-spacing:-.01em;
            margin-bottom:14px;
        }
        .en-line{
            font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.06em;
            color:var(--steel); text-transform:uppercase; margin-bottom:30px;
        }
        .cta{
            display:inline-flex; align-items:center; gap:9px;
            font-family:'IBM Plex Mono',monospace; font-size:.82rem; letter-spacing:.06em;
            padding:13px 26px; background:var(--ink); color:var(--paper);
            text-decoration:none; text-transform:uppercase; transition:background .25s ease;
        }
        .cta:hover{background:#0a2038}

        footer{
            max-width:900px; margin:0 auto; width:100%; padding-top:16px;
            border-top:1px solid var(--line);
            font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.08em;
            color:var(--steel); text-align:center;
        }
        @media (prefers-reduced-motion:reduce){.seal-dot{animation:none; opacity:1}}
    </style>
</head>
